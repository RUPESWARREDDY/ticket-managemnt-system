<div class="container-fluid d-flex justify-content-center align-items-center vh-100 " style="background: linear-gradient(180deg, #6610f2, #007bff);">
  <div class="card shadow-lg p-4" style="width: 400px; border-radius: 15px;">
    
    <h3 class="text-center mb-3 fw-bold text-primary">Forgot Password</h3>
    <p class="text-center text-muted mb-4">
      Enter your registered email to receive a reset code.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <input 
          type="email" 
          formControlName="email" 
          placeholder="Enter your email"
          class="form-control form-control-lg rounded-3"
        />

        <div class="text-danger small mt-1"
             *ngIf="f['email'].touched && f['email'].invalid">
          Valid email is required.
        </div>
      </div>

      <button 
        class="btn btn-primary w-100 btn-lg rounded-pill"
        type="submit"
        [disabled]="form.invalid"
      >
        Send OTP
      </button>
    </form>

    <div class="text-center mt-3">
      <a routerLink="/login" class="text-decoration-none fw-semibold text-primary">
        ← Back to Login
      </a>
    </div>

  </div>
</div>
