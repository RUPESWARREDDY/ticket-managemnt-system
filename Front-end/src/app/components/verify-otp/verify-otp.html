<div class="container-fluid d-flex justify-content-center align-items-center vh-100 bg-light"  style="background: linear-gradient(180deg, #6610f2, #007bff);">

  <div class="card shadow-lg p-4" style="width: 380px; border-radius: 15px;">
    
    <h3 class="text-center mb-3 fw-bold text-primary">Verify OTP</h3>
    <p class="text-center text-muted mb-4">
      Enter the 6-digit OTP sent to your {{email}}.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">OTP Code</label>
        <input 
          type="text"
          maxlength="6"
          formControlName="otp"
          class="form-control form-control-lg text-center fw-bold tracking-widest"
          placeholder="••••••"
          style="letter-spacing: 8px;"
        />

        <div 
          class="text-danger small mt-1"
          *ngIf="f['otp'].touched && f['otp'].invalid"
        >
          Please enter a valid 6-digit OTP.
        </div>
      </div>

      <button 
        class="btn btn-primary w-100 btn-lg rounded-pill"
        type="submit"
        [disabled]="form.invalid"
      >
        Verify OTP
      </button>

    </form>
    <div class="text-center mt-3">
      <a (click)="resendOTP()" class="text-decoration-none fw-semibold text-danger" style="cursor: pointer;">
        Resend OTP
      </a>
    </div>

  </div>

</div>
