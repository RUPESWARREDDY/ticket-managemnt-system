<div class=" d-flex justify-content-center align-items-center vh-100"
     style="
       background: url('https://images.unsplash.com/photo-1551434678-e076c223a692?auto=format&fit=crop&w=1500&q=80') 
       center/cover no-repeat fixed;
     ">

  <div class=" p-4 shadow-lg rounded-4"
       style="
         width: 420px;
         backdrop-filter: blur(12px);
         background: rgba(12, 12, 12, 0.521);
         border: 1px solid rgba(10, 10, 10, 0.25);
       ">
    
    <h3 class="mb-4 text-center fw-bold text-white">
      <i class="bi bi-person-plus me-2"></i> Add Team Member
    </h3>

    <form (ngSubmit)="submitForm()" [formGroup]="teamForm">

      <div class="mb-3">
        <label class="form-label text-white fw-semibold">Name</label>
        <input type="text" formControlName="name" class="form-control">
        <div *ngIf="f['name'].touched && f['name'].invalid" class="text-warning small mt-1">
          Name is required
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label text-white fw-semibold">Email</label>
        <input type="email" formControlName="email" class="form-control">
        <div *ngIf="f['email'].touched && f['email'].invalid" class="text-warning small mt-1">
          Valid email is required
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label text-white fw-semibold">Password</label>
        <input type="password" formControlName="password" class="form-control">
        <div *ngIf="f['password'].touched && f['password'].invalid" class="text-warning small mt-1">
          Password is required
        </div>
      </div>

      <button class="btn btn-primary w-100 rounded-pill py-2 fw-bold"
              [disabled]="teamForm.invalid">
        <i class="bi bi-save me-2"></i> Save Team Member
      </button>

    </form>

  </div>
</div>
